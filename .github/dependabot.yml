version: 2
updates:
  # Dependências da raiz (husky, commitlint, biome)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 3

  # Dependências do app mobile
  - package-ecosystem: "npm"
    directory: "/app"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 5
    groups:
      expo-packages:
        patterns:
          - "expo*"
          - "@expo/*"
      react-native-packages:
        patterns:
          - "react-native*"
          - "@react-native/*"
      testing:
        patterns:
          - "jest*"
          - "@types/jest"
          - "@testing-library/*"
    ignore:
      # Major updates precisam de revisão manual
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-native"
        update-types: ["version-update:semver-major"]
      - dependency-name: "expo"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
