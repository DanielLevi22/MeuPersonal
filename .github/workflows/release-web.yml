name: Release Web

# ──────────────────────────────────────────────────────
# Triggers:
#   development (web/** changes) → Deploy Preview
#   main        (web/** changes) → Deploy Production
#   web/vX.Y.Z                  → Production + GitHub Release
# ──────────────────────────────────────────────────────
on:
  push:
    branches:
      - development
      - main
    paths:
      - "web/**"
    tags:
      - "web/v*.*.*"

jobs:
  # ─────────────────────────────────────────
  # 1. VALIDATE
  # ─────────────────────────────────────────
  validate:
    name: ✅ Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: TypeScript check
        run: npm run typecheck

  # ─────────────────────────────────────────
  # 2. DEPLOY PREVIEW (push em development)
  # ─────────────────────────────────────────
  deploy-preview:
    name: 🌐 Deploy Preview
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/development'
    environment: Preview
    defaults:
      run:
        working-directory: ./web
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Pull Vercel project config
        run: npx vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build (Preview)
        run: npx vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL_PREVIEW }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY_PREVIEW }}

      - name: Deploy to Vercel (Preview)
        run: npx vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}

  # ─────────────────────────────────────────
  # 3. DEPLOY PRODUCTION (push em main ou tag)
  # ─────────────────────────────────────────
  deploy-production:
    name: 🚀 Deploy Production
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/web/v')
    environment: Production
    defaults:
      run:
        working-directory: ./web
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Pull Vercel project config
        run: npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build (Production)
        run: npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL_PROD }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY_PROD }}

      - name: Deploy to Vercel (Production)
        run: npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  # ─────────────────────────────────────────
  # 4. GITHUB RELEASE (apenas tags)
  # ─────────────────────────────────────────
  github-release:
    name: 📝 GitHub Release
    runs-on: ubuntu-latest
    needs: deploy-production
    if: startsWith(github.ref, 'refs/tags/web/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --list 'web/v*' --sort=-version:refname | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi
          NOTES=$(git log $RANGE --pretty=format:"- %s" --no-merges \
            | grep -E "^- (feat|fix|refactor|perf|docs|chore|test)(\(.+\))?:" \
            || echo "- Sem mudanças documentadas")
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "MeuPersonal Web ${{ github.ref_name }}"
          body: |
            ## ${{ github.ref_name }}

            ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: false
