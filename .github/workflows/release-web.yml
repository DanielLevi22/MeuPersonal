name: Release Web

# ──────────────────────────────────────────────────────
# Triggers:
#   develop (web/** changes) → Deploy preview (staging)
#   main    (web/** changes) → Deploy production
#   web/vX.Y.Z              → production + GitHub Release
# ──────────────────────────────────────────────────────
on:
  push:
    branches:
      - develop
      - main
    paths:
      - "web/**"
    tags:
      - "web/v*.*.*"

jobs:
  # ─────────────────────────────────────────
  # 1. VALIDATE
  # ─────────────────────────────────────────
  validate:
    name: ✅ Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: TypeScript check
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL_DEV }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY_DEV }}

  # ─────────────────────────────────────────
  # 2. DEPLOY PREVIEW (push em develop)
  # ─────────────────────────────────────────
  deploy-preview:
    name: 🌐 Deploy Preview (Staging)
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/develop'
    defaults:
      run:
        working-directory: ./web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Deploy to staging
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL_PREVIEW }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY_PREVIEW }}
      # TODO: adicionar step de deploy (Vercel, AWS, etc.)

  # ─────────────────────────────────────────
  # 3. DEPLOY PRODUCTION (push em main OU tag)
  # ─────────────────────────────────────────
  deploy-production:
    name: 🚀 Deploy Production
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/web/v')
    defaults:
      run:
        working-directory: ./web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL_PROD }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY_PROD }}
      # TODO: adicionar step de deploy (Vercel, AWS, etc.)

  # ─────────────────────────────────────────
  # 4. GITHUB RELEASE (apenas tags)
  # ─────────────────────────────────────────
  github-release:
    name: 📝 GitHub Release
    runs-on: ubuntu-latest
    needs: deploy-production
    if: startsWith(github.ref, 'refs/tags/web/v')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "MeuPersonal Web ${{ github.ref_name }}"
          body: |
            ## 🚀 Release ${{ github.ref_name }}

            Deploy gerado automaticamente via CI/CD.
            Confira o [CHANGELOG.md](./CHANGELOG.md) para detalhes das mudanças.
          draft: false
          prerelease: false
