name: Release

# ──────────────────────────────────────────────────────
# Triggers por ambiente:
#   develop  →  Build preview (staging/QA)
#   main     →  Build production
#   tag vX   →  Build production + Submit Google Play + GitHub Release
# ──────────────────────────────────────────────────────
on:
  push:
    branches:
      - develop   # → preview environment
      - main      # → production build
    tags:
      - "v*.*.*"  # → production + submit + github release

jobs:
  # ─────────────────────────────────────────
  # 1. VALIDATE (roda sempre)
  # ─────────────────────────────────────────
  validate:
    name: ✅ Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm run test:coverage -- --ci
        env:
          CI: true
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL_DEV }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY_DEV }}
          EXPO_PUBLIC_GEMINI_API_KEY: ${{ secrets.EXPO_PUBLIC_GEMINI_API_KEY }}

  # ─────────────────────────────────────────
  # 2. BUILD PREVIEW (push em develop)
  # ─────────────────────────────────────────
  build-preview:
    name: 📦 EAS Preview Build (Staging)
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/develop'
    defaults:
      run:
        working-directory: ./app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: EAS Build → preview
        run: eas build --platform android --profile preview --non-interactive
        env:
          EXPO_PUBLIC_SUPABASE_URL_PREVIEW: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL_PREVIEW }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY_PREVIEW: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY_PREVIEW }}
          EXPO_PUBLIC_GEMINI_API_KEY: ${{ secrets.EXPO_PUBLIC_GEMINI_API_KEY }}

  # ─────────────────────────────────────────
  # 3. BUILD PRODUCTION (push em main OU tag)
  # ─────────────────────────────────────────
  build-production:
    name: 🚀 EAS Production Build
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    defaults:
      run:
        working-directory: ./app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: EAS Build → production
        run: eas build --platform android --profile production --non-interactive
        env:
          EXPO_PUBLIC_SUPABASE_URL_PROD: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL_PROD }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY_PROD: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY_PROD }}
          EXPO_PUBLIC_GEMINI_API_KEY: ${{ secrets.EXPO_PUBLIC_GEMINI_API_KEY }}

  # ─────────────────────────────────────────
  # 4. SUBMIT TO GOOGLE PLAY (apenas tags)
  # ─────────────────────────────────────────
  submit:
    name: 📲 Submit to Google Play
    runs-on: ubuntu-latest
    needs: build-production
    if: startsWith(github.ref, 'refs/tags/v')
    defaults:
      run:
        working-directory: ./app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: EAS Submit → Internal Track
        run: eas submit --platform android --profile production --latest --non-interactive

  # ─────────────────────────────────────────
  # 5. GITHUB RELEASE (apenas tags)
  # ─────────────────────────────────────────
  github-release:
    name: 📝 GitHub Release
    runs-on: ubuntu-latest
    needs: build-production
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "MeuPersonal ${{ github.ref_name }}"
          body: |
            ## 🚀 Release ${{ github.ref_name }}

            Build gerada automaticamente via CI/CD.
            Confira o [CHANGELOG.md](./CHANGELOG.md) para detalhes das mudanças.
          draft: false
          prerelease: false
