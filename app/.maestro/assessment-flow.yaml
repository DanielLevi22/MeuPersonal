appId: com.meupersonal.app
---
# Assessment Flow (Anamnesis)
# Tests the multi-step anamnesis wizard

- launchApp

# Login
- tapOn: "Entrar"
- inputText: "student@test.com"
- tapOn: "Senha"
- inputText: "password123"
- tapOn: "Entrar"

# Navigate to Anamnesis
- assertVisible: "Dashboard"
- scrollUntilVisible:
    element: "Anamnese"
    direction: DOWN
- tapOn: "Anamnese"

# Start Wizard
- assertVisible: "Ficha de Saúde"
- tapOn: "Começar Agora"

# Step 1: Personal Info
- assertVisible: "Informações Pessoais"
- tapOn: "Peso (kg)"
- inputText: "80"
- tapOn: "Altura (cm)"
- inputText: "180"
- tapOn: "Próximo"

# Step 2: Health History
- assertVisible: "Histórico de Saúde"
- tapOn: "Não"
- scrollUntilVisible:
    element: "Próximo"
    direction: DOWN
- tapOn: "Próximo"

# Step 3: Goals
- assertVisible: "Objetivos"
- tapOn: "Hipertrofia"
- tapOn: "Finalizar"

# Verify Completion
- assertVisible: "Concluído"
- tapOn: "Voltar para Dashboard"
- assertVisible: "Dashboard"
