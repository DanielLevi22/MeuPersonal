appId: com.Eleva Pro.app
---
# Gamification Sync Flow
# Tests that completing a workout updates the streak and dashboard stats

- launchApp

# Login
- tapOn: "Entrar"
- inputText: "student@test.com"
- tapOn: "Senha"
- inputText: "password123"
- tapOn: "Entrar"

# Note initial streak (Optional, manual check usually)
- assertVisible: "Dashboard"

# Complete a workout (Simplified flow)
- tapOn: "Treinos"
- tapOn:
    index: 0
    id: "workout-card"
- tapOn: "Iniciar Treino"
- tapOn: "Finalizar Treino"
- tapOn: "Confirmar"

# Return to Dashboard
- tapOn: "Ir para Início"

# Verify stats are updated
- assertVisible: "Treino"
- assertVisible: "1 / 1" # Assuming goal is 1
