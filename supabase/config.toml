# Supabase local development config
# Docs: https://supabase.com/docs/guides/cli/config
# Rodar: supabase start (precisa Docker)

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
# URL do app mobile (Expo dev server)
site_url = "exp://127.0.0.1:8081"
additional_redirect_urls = [
  "http://127.0.0.1:3000",
  "http://localhost:3000",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
minimum_password_length = 6

[auth.email]
enable_signup = true
double_confirm_changes = false
# Local: não exige confirmação de email
enable_confirmations = false

[edge_runtime]
enabled = true

[analytics]
enabled = false
